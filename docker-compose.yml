services:
  db:
    image: postgres:17

    container_name: study_record_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: study_record_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: study_record_api

    depends_on:
      - db

    ports:
      - "8000:8000"

    env_file:
      - .env

volumes:
  postgres_data: